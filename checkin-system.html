const GIST_DATA_FILE = 'checkin-data.json';

// 加载 Gist 数据
async function loadGistData() {
  if (!GITHUB_TOKEN || GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN') {
    document.getElementById('loading-mask').innerHTML = 
      '<div style="text-align:center;padding:40px;color:#c8102e">' +
      '<h3>⚠️ 请配置 GitHub Token</h3>' +
      '<p style="margin-top:12px;font-size:14px;color:#666">请编辑 HTML 文件，填入您的 GitHub Personal Access Token</p>' +
      '<p style="margin-top:8px;font-size:12px;color:#999">Token 需要 gist 权限</p></div>';
    return null;
  }
  
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (!res.ok) {
      if (res.status === 404) {
        // Gist 不存在，创建新的
        return await createGist();
      }
      throw new Error(`HTTP ${res.status}`);
    }
    const gist = await res.json();
    if (gist.files[GIST_DATA_FILE]) {
      return JSON.parse(gist.files[GIST_DATA_FILE].content);
    } else {
      // 文件不存在，创建初始数据
      return await createInitialData();
    }
  } catch(e) {
    console.error('加载数据失败:', e);
    document.getElementById('loading-mask').innerHTML = 
      '<div style="text-align:center;padding:40px;color:#c8102e">' +
      '<h3>⚠️ 数据加载失败</h3>' +
      '<p style="margin-top:12px;font-size:13px;color:#666">'+e.message+'</p></div>';
    return null;
  }
}

// 创建新的 Gist
async function createGist() {
  const initialData = {
    persons: getPresetPersons(),
    records: [],
    lastUpdated: new Date().toISOString()
  };
  
  const res = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: {
      'Authorization': `token ${GITHUB_TOKEN}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      description: 'TCL营销战区签到数据',
      public: false,
      files: {
        [GIST_DATA_FILE]: { content: JSON.stringify(initialData, null, 2) }
      }
    })
  });
  
  if (!res.ok) throw new Error(`创建 Gist 失败: HTTP ${res.status}`);
  const gist = await res.json();
  console.log('已创建新 Gist:', gist.id);
  return initialData;
}

// 创建初始数据
async function createInitialData() {
  const initialData = {
    persons: getPresetPersons(),
    records: [],
    lastUpdated: new Date().toISOString()
  };
  await saveGistData(initialData);
  return initialData;
}

// 保存数据到 Gist
async function saveGistData(data) {
  data.lastUpdated = new Date().toISOString();
  
  try {
    // 先获取当前 Gist
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const gist = await res.json();
    
    // 更新 Gist
    const updateRes = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: {
          [GIST_DATA_FILE]: { content: JSON.stringify(data, null, 2) }
        }
      })
    });
    
    if (!updateRes.ok) throw new Error(`保存失败: HTTP ${updateRes.status}`);
    showSyncStatus('数据已同步', '#1a8a4a');
    return true;
  } catch(e) {
    console.error('保存数据失败:', e);
    showSyncStatus('同步失败', '#c8102e');
    return false;
  }
}

// 加载所有数据
async function loadAllData() {
  showSyncStatus('正在同步...', '#d97706');
  gistData = await loadGistData();
  if (gistData) {
    persons = gistData.persons || [];
    records = gistData.records || [];
    populateFilterSelects();
    populatePersonFilters();
    document.getElementById('person-count').textContent = persons.length;
    showSyncStatus('数据已同步', '#1a8a4a');
  }
}

// 签到操作
async function doCheckin(personId) {
  // 检查是否已签到
  if (records.some(r => r.person_id === personId)) {
    return 'dup';
  }
  
  const newRecord = {
    id: Date.now(),
    person_id: personId,
    checkin_time: new Date().toISOString()
  };
  
  records.push(newRecord);
  gistData.records = records;
  
  const success = await saveGistData(gistData);
  if (!success) {
    // 回滚
    records = records.filter(r => r.id !== newRecord.id);
    return false;
  }
  return true;
}

// 撤销签到
async function doCancelCheckin(recordId) {
  const record = records.find(r => r.id === recordId);
  if (!record) return false;
  
  const idx = records.indexOf(record);
  records.splice(idx, 1);
  gistData.records = records;
  
  const success = await saveGistData(gistData);
  if (!success) {
    records.splice(idx, 0, record);
    return false;
  }
  return true;
}

      loadAllData().then(() => refreshDashboard());

// ========== 看板逻辑 ==========
function refreshDashboard() {
  const signedIds = new Set(records.map(r => r.person_id));
  const total = persons.length;
  const signed = persons.filter(p => signedIds.has(p.id)).length;
  const unsigned = total - signed;
  const rate = total > 0 ? Math.round(signed / total * 100) : 0;
  document.getElementById('global-metrics').innerHTML =
    '<div class="metric"><div class="metric-label">应到人数</div><div class="metric-val">' + total + '</div></div>' +
    '<div class="metric"><div class="metric-label">已签到</div><div class="metric-val green">' + signed + '</div></div>' +
    '<div class="metric"><div class="metric-label">未签到</div><div class="metric-val red">' + unsigned + '</div></div>' +
    '<div class="metric"><div class="metric-label">签到率</div><div class="metric-val orange">' + rate + '%</div></div>';
  renderL6Content(signedIds);
  renderL7Content(signedIds);
  renderTrend();
}

function renderL6Content(signedIds) {
  const unitMap = {};
  persons.forEach(p => {
    const uname = p.l6 || '(未填写)';
    if (!unitMap[uname]) unitMap[uname] = { signed:0, total:0 };
    unitMap[uname].total++;
    if (signedIds.has(p.id)) unitMap[uname].signed++;
  });
  const units = Object.entries(unitMap).sort((a,b) => b[1].total - a[1].total);
  if (!units.length) { document.getElementById('l6-content').innerHTML = '<p style="color:#aaa;text-align:center;padding:30px">暂无数据</p>'; return; }
  let html = '<div class="unit-grid">';
  units.forEach(([uname, stat]) => {
    const r = stat.total > 0 ? Math.round(stat.signed / stat.total * 100) : 0;
    const c = r>=90?'#1a8a4a':r>=50?'#d97706':'#c8102e';
    html += '<div class="unit-card"><div class="unit-card-title"><span>' + escHtml(uname) + '</span><span style="font-size:18px;color:' + c + '">' + r + '%</span></div>' +
      '<div class="stat-inline"><span>应到 ' + stat.total + '</span><span class="signed">已签 ' + stat.signed + '</span><span class="unsigned">未签 ' + (stat.total-stat.signed) + '</span></div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + r + '%;background:' + c + '"></div></div></div>';
  });
  html += '</div>';
  document.getElementById('l6-content').innerHTML = html;
}

function renderL7Content(signedIds) {
  const l6List = [...new Set(persons.map(p=>p.l6).filter(Boolean))].sort();
  if (!activeL6Tab && l6List.length) activeL6Tab = l6List[0];
  let tabsHtml = '';
  l6List.forEach(l6 => { tabsHtml += '<span class="section-tab ' + (activeL6Tab===l6?'active':'') + '" onclick="setL6Tab(this)" data-l6="' + escAttr(l6) + '">' + escHtml(l6) + '</span>'; });
  document.getElementById('l6-tabs').innerHTML = tabsHtml;

  const unitMap = {};
  persons.filter(p => p.l6 === activeL6Tab).forEach(p => {
    const uname = p.l7 || '(未填写)';
    if (!unitMap[uname]) unitMap[uname] = { signed:0, total:0 };
    unitMap[uname].total++;
    if (signedIds.has(p.id)) unitMap[uname].signed++;
  });
  const units = Object.entries(unitMap).sort((a,b) => b[1].total - a[1].total);
  if (!units.length) { document.getElementById('l7-content').innerHTML = '<p style="color:#aaa;text-align:center;padding:20px">暂无数据</p>'; return; }
  let html = '<table style="width:100%;border-collapse:collapse;font-size:13px;min-width:480px"><thead><tr>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500">战区（七级单位）</th>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500;text-align:center;width:72px">应到</th>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500;text-align:center;width:72px">已签到</th>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500;text-align:center;width:72px">未签到</th>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500;min-width:160px">签到率</th>' +
    '</tr></thead><tbody>';
  units.forEach(([uname, stat]) => {
    const r = Math.round(stat.signed / stat.total * 100);
    const c = r>=90?'#1a8a4a':r>=50?'#d97706':'#c8102e';
    html += '<tr><td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0">' + escHtml(uname) + '</td>' +
      '<td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0;text-align:center">' + stat.total + '</td>' +
      '<td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0;text-align:center;color:#1a8a4a;font-weight:500">' + stat.signed + '</td>' +
      '<td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0;text-align:center;color:#c8102e;font-weight:500">' + (stat.total-stat.signed) + '</td>' +
      '<td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0"><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:#f0f0f0;border-radius:4px;height:8px;overflow:hidden"><div style="height:8px;border-radius:4px;background:' + c + ';width:' + r + '%;transition:width 0.4s"></div></div><span style="font-size:12px;color:#666;min-width:32px">' + r + '%</span></div></td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('l7-content').innerHTML = html;
}

function setL6Tab(el) { activeL6Tab = el.dataset.l6; refreshDashboard(); }

function renderTrend() {
  const counts = new Array(24).fill(0);
  const today = new Date().toDateString();
  records.forEach(r => {
    const d = new Date(r.checkin_time);
    if (d.toDateString() === today) counts[d.getHours()]++;
  });
  const cumulative = []; let acc = 0;
  counts.forEach(c => { acc += c; cumulative.push(acc); });
  const ctx = document.getElementById('trendChart');
  if (trendChartInst) trendChartInst.destroy();
  trendChartInst = new Chart(ctx, {
    type:'line',
    data:{
      labels:Array.from({length:24},(_,i)=>i+':00'),
      datasets:[{label:'累计签到',data:cumulative,borderColor:'#c8102e',backgroundColor:'rgba(200,16,46,0.07)',borderWidth:2,pointRadius:2,fill:true,tension:0.3}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:12}},y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
}

function renderCheckinTable() {
  const signedMap = {};
  records.forEach(r => { signedMap[r.person_id] = r; });
  const kw = document.getElementById('filter-kw').value.trim().toLowerCase();
  const l6f = document.getElementById('filter-l6').value;
  const l7f = document.getElementById('filter-l7').value;
  const sf = document.getElementById('filter-signed').value;
  const rows = persons.filter(p => {
    if (kw && !p.name.toLowerCase().includes(kw) && !(p.no||'').toLowerCase().includes(kw)) return false;
    if (l6f && p.l6 !== l6f) return false;
    if (l7f && p.l7 !== l7f) return false;
    const isSigned = !!signedMap[p.id];
    if (sf==='1' && !isSigned) return false;
    if (sf==='0' && isSigned) return false;
    return true;
  });
  let html = '';
  rows.forEach(p => {
    const rec = signedMap[p.id]; const signed = !!rec;
    const cancelBtn = signed ? '<button class="btn btn-outline btn-sm" onclick="cancelCheckin('+rec.id+')">撤销</button>' : '';
    const signBtn = !signed ? '<button class="btn btn-success btn-sm" onclick="manualCheckin('+p.id+')">手动签到</button>' : '';
    html += '<tr><td style="color:#888">'+(p.no||'')+'</td><td>'+escHtml(p.name)+'</td><td>'+escHtml(p.l6||'')+'</td><td>'+escHtml(p.l7||'')+'</td>' +
      '<td><span class="badge '+(signed?'badge-signed':'badge-not')+'">'+(signed?'已签到':'未签到')+'</span></td>' +
      '<td style="font-size:12px;color:#888;white-space:nowrap">'+(rec?fmtTime(rec.checkin_time):'—')+'</td>' +
      '<td>'+cancelBtn+signBtn+'</td></tr>';
  });
  document.getElementById('checkin-tbody').innerHTML = html;
}

async function manualCheckin(personId) {
  const result = await doCheckin(personId);
  if (result === true) { renderCheckinTable(); refreshDashboard(); }
  else if (result === 'dup') { alert('该人员已签到'); }
  else { alert('签到失败'); }
}

async function cancelCheckin(recordId) {
  if (!confirm('确定撤销该签到记录？')) return;
  const result = await doCancelCheckin(recordId);
  if (result) { renderCheckinTable(); refreshDashboard(); }
  else { alert('撤销失败'); }
}

function exportCSV() {
  const signedMap = {};
  records.forEach(r=>{ signedMap[r.person_id]=r; });
  const header = '工号,姓名,大区,战区,签到状态,签到时间';
  const body = persons.map(p => {
    const rec = signedMap[p.id];
    return [p.no,p.name,p.l6,p.l7,rec?'已签到':'未签到',rec?fmtTime(rec.checkin_time):''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  const csv = header + '\n' + body.join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'TCL营销战区签到记录_'+new Date().toLocaleDateString()+'.csv'; a.click();
}

  }
}

function previewPerson() {
  const no = document.getElementById('ci-no').value.trim();
  const preview = document.getElementById('ci-preview');
  const noMatch = document.getElementById('ci-no-match');
  if (!no) { preview.style.display='none'; noMatch.style.display='none'; return; }
  const p = persons.find(p=>p.no===no);
  if (!p) { preview.style.display='none'; noMatch.style.display='block'; return; }
  noMatch.style.display='none';
  document.getElementById('pv-name').textContent=p.name;
  document.getElementById('pv-l6').textContent=p.l6||'—';
  document.getElementById('pv-l7').textContent=p.l7||'—';
  preview.style.display='block';
}

async function submitCheckin() {
  const no = document.getElementById('ci-no').value.trim();
  if (!no) return alert('请输入工号');
  const p = persons.find(p=>p.no===no);
  if (!p) return alert('未找到该工号，请确认工号是否正确');
  
  const existing = records.find(r=>r.person_id===p.id);
  if (existing) {
    showCard('ci-dup-card');
    document.getElementById('ci-dup-msg').textContent = p.name + '，您的签到已于 ' + fmtTime(existing.checkin_time) + ' 完成，无需重复签到';
    return;
  }
  
  const result = await doCheckin(p.id);
  if (result === true) {
    showCard('ci-success-card');
    const rows = [['姓名',p.name],['工号',p.no],['大区',p.l6],['战区',p.l7]];
    document.getElementById('ci-success-detail').innerHTML = rows.map(([k,v])=>'<div class="info-row"><span class="info-label">'+k+'</span><span class="info-val">'+(v||'—')+'</span></div>').join('');
    document.getElementById('ci-success-time').textContent = '签到时间：'+fmtTime(new Date().toISOString());
    refreshDashboard && refreshDashboard();
  } else if (result === 'dup') {
    showCard('ci-dup-card');
    document.getElementById('ci-dup-msg').textContent = p.name + '，您已完成签到，无需重复操作';
  } else {
    alert('签到失败，请重试');
  }
}

function showCard(id) { ['ci-form-card','ci-success-card','ci-dup-card'].forEach(cid=>{ document.getElementById(cid).style.display = cid===id ? 'block' : 'none'; }); }

// ========== 工具函数 ==========
function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const pad = n => n<10?'0'+n:n;
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
