<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>

  body{font-family:'Microsoft YaHei',sans-serif;background:#f5f6fa;color:#222;font-size:14px}

  .nav-brand{color:#fff;font-size:16px;font-weight:500;margin-right:32px;white-space:nowrap;display:flex;align-items:center;gap:8px}

  .nav-tab{color:rgba(255,255,255,0.75);padding:0 16px;height:52px;display:flex;align-items:center;cursor:pointer;font-size:14px;border-bottom:3px solid transparent;transition:all 0.2s}
  .nav-tab:hover{color:#fff}
  .nav-tab.active{color:#fff;border-bottom:3px solid #fff}
  .page{display:none;padding:24px}
  .page.active{display:block}
  .card{background:#fff;border-radius:10px;border:0.5px solid #e2e2e2;padding:20px 24px;margin-bottom:16px}
  .card-title{font-size:15px;font-weight:500;margin-bottom:16px;color:#111}
  .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .metric{background:#f5f6fa;border-radius:8px;padding:16px;text-align:center}
  .metric-label{font-size:12px;color:#888;margin-bottom:6px}
  .metric-val{font-size:26px;font-weight:500;color:#111}
  .metric-val.red{color:#c8102e}
  .metric-val.green{color:#1a8a4a}
  .metric-val.orange{color:#d97706}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#f5f6fa;font-weight:500;padding:10px 12px;text-align:left;border-bottom:1px solid #eee;white-space:nowrap}
  td{padding:9px 12px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle}
  tr:hover td{background:#fafafa}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500}
  .badge-signed{background:#dcfce7;color:#166534}
  .badge-not{background:#fee2e2;color:#991b1b}
  .btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity 0.15s}
  .btn:hover{opacity:0.85}
  .btn-primary{background:#c8102e;color:#fff}
  .btn-outline{background:#fff;color:#c8102e;border:1px solid #c8102e}
  .btn-sm{padding:4px 10px;font-size:12px}
  .btn-success{background:#1a8a4a;color:#fff}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;transition:border 0.15s}
  input:focus,select:focus{border-color:#c8102e}
  .form-group{margin-bottom:12px}
  .form-group label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:500}
  .section-tabs{display:flex;gap:0;border-bottom:1px solid #eee;margin-bottom:20px}
  .section-tab{padding:8px 20px;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;transition:all 0.2s}
  .section-tab.active{color:#c8102e;border-bottom:2px solid #c8102e;font-weight:500}
  .qr-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px}
  .qr-wrap{background:#fff;padding:12px;border-radius:8px;border:1px solid #eee}
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .filter-bar select,.filter-bar input{width:auto;min-width:120px}
  .checkin-card{background:#fff;border-radius:14px;padding:32px 28px;width:100%;max-width:400px}
  .checkin-header{text-align:center;margin-bottom:24px}

  .checkin-header p{font-size:13px;color:#888}
  .success-icon{width:64px;height:64px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px}

  .info-label{color:#888;min-width:80px}
  .info-val{color:#111;text-align:right;font-weight:500}

  .unit-card{background:#fafafa;border-radius:8px;padding:14px 16px;border:1px solid #f0f0f0}
  .unit-card-title{font-size:14px;font-weight:500;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}

</head>
<body>
<div id="app-shell">
<nav class="nav">
  <span class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    TCL营销战区签到
  </span>
  <span class="nav-tab active" data-page="dashboard">数据看板</span>
  <span class="nav-tab" data-page="checkin-mgmt">签到记录</span>
  <span class="nav-tab" data-page="person-mgmt">人员名单</span>
  <span class="nav-tab" data-page="qr-page">二维码入口</span>
</nav>

<div class="page active" id="page-dashboard">
  <div class="metrics-grid" id="global-metrics"></div>
  <div class="card"><div class="card-title">大区签到统计</div><div id="l6-content"></div></div>
  <div class="card"><div class="card-title">战区签到统计</div><div class="section-tabs" id="l6-tabs"></div><div id="l7-content"></div></div>
  <div class="card"><div class="card-title">签到趋势（今日）</div><div style="position:relative;height:220px"><canvas id="trendChart" role="img" aria-label="签到趋势图">签到趋势图</canvas></div></div>
</div>
<div class="page" id="page-checkin-mgmt">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span class="card-title" style="margin:0">签到记录</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="exportCSV()">导出 CSV</button>
        <button class="btn btn-primary btn-sm" onclick="refreshDashboard()">刷新看板</button>
      </div>
    </div>
    <div class="filter-bar">
      <input id="filter-kw" placeholder="姓名/工号" oninput="renderCheckinTable()" style="width:120px">
      <select id="filter-l6" onchange="onL6FilterChange();renderCheckinTable()"><option value="">全部大区</option></select>
      <select id="filter-l7" onchange="renderCheckinTable()"><option value="">全部战区</option></select>
      <select id="filter-signed" onchange="renderCheckinTable()"><option value="">全部状态</option><option value="1">已签到</option><option value="0">未签到</option></select>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>工号</th><th>姓名</th><th>大区（六级）</th><th>战区（七级）</th><th>状态</th><th>签到时间</th><th>操作</th></tr></thead>
      <tbody id="checkin-tbody"></tbody></table>
    </div>
  </div>
</div>
<div class="page" id="page-person-mgmt">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span class="card-title" style="margin:0">名单（<span id="person-count">0</span>人）</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="resetToPreset()">恢复预置名单</button>
        <button class="btn btn-outline btn-sm" onclick="clearAllPersons()" style="color:#999;border-color:#ddd">清空全部</button>
      </div>
    </div>
    <div class="filter-bar" style="margin-bottom:12px">
      <input id="search-person" placeholder="搜索工号/姓名/大区/战区" oninput="renderPersonTable()" style="width:240px">
      <select id="filter-person-l6" onchange="renderPersonTable()" style="width:auto;min-width:120px"><option value="">全部大区</option></select>
    </div>
    <div class="table-wrap" style="max-height:560px;overflow-y:auto">
      <table><thead><tr><th>工号</th><th>姓名</th><th>大区（六级）</th><th>战区（七级）</th><th>状态</th></tr></thead>
      <tbody id="person-tbody"></tbody></table>
    </div>
  </div>
</div>

<div class="page" id="page-qr-page">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:800px">
    <div class="card"><div class="card-title">签到二维码</div><div class="qr-box"><div class="qr-wrap" id="qr-container"></div><p style="font-size:12px;color:#888;text-align:center">扫码进入签到页<br>仅需输入工号即可完成签到</p><button class="btn btn-primary" onclick="downloadQR()">下载二维码</button></div></div>
    <div class="card"><div class="card-title">签到链接</div><p style="font-size:13px;color:#666;margin-bottom:12px">将以下链接发给参与者，或使用左侧二维码扫码签到。</p><div style="background:#f5f6fa;border-radius:6px;padding:10px;font-size:12px;word-break:break-all;color:#444;margin-bottom:12px" id="checkin-url-display"></div><button class="btn btn-outline" onclick="copyCheckinUrl()">复制链接</button><hr style="margin:16px 0;border:none;border-top:0.5px solid #eee"><p style="font-size:13px;color:#666;margin-bottom:8px">本地测试用</p><button class="btn btn-primary" onclick="openCheckinPage()">打开签到页面</button></div>
  </div>
</div>
</div>
<div id="checkin-landing" style="display:none;position:fixed;inset:0;z-index:999;background:#f5f6fa;overflow-y:auto">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
    <div class="checkin-card" id="ci-form-card">
      <div class="checkin-header">
        <div style="width:56px;height:56px;background:#c8102e;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg>
        </div>
        <h2>TCL营销战区签到</h2>
        <p>输入工号，系统自动匹配您的信息</p>
      </div>
      <div class="form-group"><label>工号 *</label><input id="ci-no" placeholder="请输入工号" autocomplete="off" style="font-size:16px;padding:11px 12px" oninput="previewPerson()"></div>
      <div id="ci-preview" style="display:none;background:#f5f6fa;border-radius:8px;padding:12px 14px;margin-bottom:14px">
        <div class="info-row"><span class="info-label">姓名</span><span class="info-val" id="pv-name"></span></div>
        <div class="info-row"><span class="info-label">大区</span><span class="info-val" id="pv-l6"></span></div>
        <div class="info-row"><span class="info-label">战区</span><span class="info-val" id="pv-l7"></span></div>
      </div>
      <div id="ci-no-match" style="display:none;color:#c8102e;font-size:13px;margin-bottom:12px;padding:10px 12px;background:#fee2e2;border-radius:6px">未找到该工号，请确认工号是否正确，或联系现场管理员</div>
      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:15px" onclick="submitCheckin()">确认签到</button>
    </div>
    <div class="checkin-card" id="ci-success-card" style="display:none;text-align:center">
      <div class="success-icon">✓</div>
      <h2 style="font-size:20px;margin-bottom:8px;color:#166534">签到成功！</h2>
      <div style="background:#f5f6fa;border-radius:8px;padding:12px 14px;margin:16px 0;text-align:left" id="ci-success-detail"></div>
      <p style="font-size:12px;color:#aaa" id="ci-success-time"></p>
    </div>
    <div class="checkin-card" id="ci-dup-card" style="display:none;text-align:center">
      <div style="width:64px;height:64px;background:#fef3c7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px">!</div>
      <h2 style="font-size:18px;margin-bottom:8px;color:#92400e">您已签到</h2>
      <p style="color:#888;font-size:13px" id="ci-dup-msg"></p>
      <button class="btn btn-outline" style="margin-top:20px;width:100%" onclick="resetCheckinForm()">重新签到</button>
    </div>
  </div>
</div>

const DB_KEY = 'checkin_sys_tcl_v3';
let db = loadDB();
function loadDB() {
  try { const raw = localStorage.getItem(DB_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
  return initFromPreset();
}
function initFromPreset() {
  const persons = []; let nextId = 1;
  PRESET_PERSONS.forEach(d => { persons.push({ id: String(nextId++) + '_' + Date.now(), no: d[0], name: d[1], l6: d[2], l7: d[3] }); });
  return { persons, records: [], nextId };
}
function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function uid() { return (db.nextId++) + '_' + Date.now(); }

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.page).classList.add('active');
    if (tab.dataset.page === 'dashboard') refreshDashboard();
    if (tab.dataset.page === 'checkin-mgmt') { populateFilterSelects(); renderCheckinTable(); }
    if (tab.dataset.page === 'person-mgmt') { populatePersonFilters(); renderPersonTable(); }
    if (tab.dataset.page === 'qr-page') renderQR();
  });
});

let activeL6Tab = '';
let trendChartInst = null;

function refreshDashboard() {
  const persons = db.persons;
  const signedIds = new Set(db.records.map(r => r.personId).filter(Boolean));
  const total = persons.length;
  const signed = persons.filter(p => signedIds.has(p.id)).length;
  const unsigned = total - signed;
  const rate = total > 0 ? Math.round(signed / total * 100) : 0;
  document.getElementById('global-metrics').innerHTML =
    '<div class="metric"><div class="metric-label">应到人数</div><div class="metric-val">' + total + '</div></div>' +
    '<div class="metric"><div class="metric-label">已签到</div><div class="metric-val green">' + signed + '</div></div>' +
    '<div class="metric"><div class="metric-label">未签到</div><div class="metric-val red">' + unsigned + '</div></div>' +
    '<div class="metric"><div class="metric-label">签到率</div><div class="metric-val orange">' + rate + '%</div></div>';
  renderL6Content(signedIds);
  renderL7Content(signedIds);
  renderTrend();
}

function renderL6Content(signedIds) {
  const unitMap = {};
  db.persons.forEach(p => {
    const uname = p.l6 || '(未填写)';
    if (!unitMap[uname]) unitMap[uname] = { signed:0, total:0 };
    unitMap[uname].total++;
    if (signedIds.has(p.id)) unitMap[uname].signed++;
  });
  const units = Object.entries(unitMap).sort((a,b) => b[1].total - a[1].total);
  if (!units.length) { document.getElementById('l6-content').innerHTML = '<p style="color:#aaa;text-align:center;padding:30px">暂无数据</p>'; return; }
  let html = '<div class="unit-grid">';
  units.forEach(([uname, stat]) => {
    const r = stat.total > 0 ? Math.round(stat.signed / stat.total * 100) : 0;
    const c = r>=90?'#1a8a4a':r>=50?'#d97706':'#c8102e';
    html += '<div class="unit-card"><div class="unit-card-title"><span>' + uname + '</span><span style="font-size:18px;color:' + c + '">' + r + '%</span></div>' +
      '<div class="stat-inline"><span>应到 ' + stat.total + '</span><span class="signed">已签 ' + stat.signed + '</span><span class="unsigned">未签 ' + (stat.total-stat.signed) + '</span></div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + r + '%;background:' + c + '"></div></div></div>';
  });
  html += '</div>';
  document.getElementById('l6-content').innerHTML = html;
}

function renderL7Content(signedIds) {
  const l6List = [...new Set(db.persons.map(p=>p.l6).filter(Boolean))].sort();
  if (!activeL6Tab && l6List.length) activeL6Tab = l6List[0];
  let tabsHtml = '';
  l6List.forEach(l6 => { tabsHtml += '<span class="section-tab ' + (activeL6Tab===l6?'active':'') + '" onclick="setL6Tab(this)" data-l6="' + l6 + '">' + l6 + '</span>'; });
  document.getElementById('l6-tabs').innerHTML = tabsHtml;

  const unitMap = {};
  db.persons.filter(p => p.l6 === activeL6Tab).forEach(p => {
    const uname = p.l7 || '(未填写)';
    if (!unitMap[uname]) unitMap[uname] = { signed:0, total:0 };
    unitMap[uname].total++;
    if (signedIds.has(p.id)) unitMap[uname].signed++;
  });
  const units = Object.entries(unitMap).sort((a,b) => b[1].total - a[1].total);
  if (!units.length) { document.getElementById('l7-content').innerHTML = '<p style="color:#aaa;text-align:center;padding:20px">暂无数据</p>'; return; }
  let html = '<table style="width:100%;border-collapse:collapse;font-size:13px;min-width:480px"><thead><tr>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500">战区（七级单位）</th>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500;text-align:center;width:72px">应到</th>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500;text-align:center;width:72px">已签到</th>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500;text-align:center;width:72px">未签到</th>' +
    '<th style="padding:8px 12px;background:#f5f6fa;border-bottom:1px solid #eee;font-weight:500;min-width:160px">签到率</th>' +
    '</tr></thead><tbody>';
  units.forEach(([uname, stat]) => {
    const r = Math.round(stat.signed / stat.total * 100);
    const c = r>=90?'#1a8a4a':r>=50?'#d97706':'#c8102e';
    html += '<tr><td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0">' + uname + '</td>' +
      '<td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0;text-align:center">' + stat.total + '</td>' +
      '<td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0;text-align:center;color:#1a8a4a;font-weight:500">' + stat.signed + '</td>' +
      '<td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0;text-align:center;color:#c8102e;font-weight:500">' + (stat.total-stat.signed) + '</td>' +
      '<td style="padding:9px 12px;border-bottom:0.5px solid #f0f0f0"><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:#f0f0f0;border-radius:4px;height:8px;overflow:hidden"><div style="height:8px;border-radius:4px;background:' + c + ';width:' + r + '%;transition:width 0.4s"></div></div><span style="font-size:12px;color:#666;min-width:32px">' + r + '%</span></div></td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('l7-content').innerHTML = html;
}

function setL6Tab(el) { activeL6Tab = el.dataset.l6; refreshDashboard(); }

function renderTrend() {
  const counts = new Array(24).fill(0);
  const today = new Date().toDateString();
  db.records.forEach(r => { const d = new Date(r.time); if (d.toDateString()===today) counts[d.getHours()]++; });
  const cumulative = []; let acc = 0;
  counts.forEach(c => { acc += c; cumulative.push(acc); });
  const ctx = document.getElementById('trendChart');
  if (trendChartInst) trendChartInst.destroy();
  trendChartInst = new Chart(ctx, { type:'line', data:{ labels:Array.from({length:24},(_,i)=>i+':00'), datasets:[{label:'累计签到',data:cumulative,borderColor:'#c8102e',backgroundColor:'rgba(200,16,46,0.07)',borderWidth:2,pointRadius:2,fill:true,tension:0.3}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:12,font:{size:11}}},y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}}}}} });
}

function populateFilterSelects() {
  const l6s = [...new Set(db.persons.map(p=>p.l6).filter(Boolean))].sort();
  const el6 = document.getElementById('filter-l6'); const prev6 = el6.value;
  el6.innerHTML = '<option value="">全部大区</option>' + l6s.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
  el6.value = prev6;
  onL6FilterChange();
}
function onL6FilterChange() {
  const l6v = document.getElementById('filter-l6').value;
  const el7 = document.getElementById('filter-l7'); const prev7 = el7.value;
  const l7s = l6v ? [...new Set(db.persons.filter(p=>p.l6===l6v).map(p=>p.l7).filter(Boolean))].sort() : [...new Set(db.persons.map(p=>p.l7).filter(Boolean))].sort();
  el7.innerHTML = '<option value="">全部战区</option>' + l7s.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
  el7.value = prev7;
}

function renderCheckinTable() {
  const signedMap = {};
  db.records.forEach(r => { if (r.personId) signedMap[r.personId] = r; });
  const kw = document.getElementById('filter-kw').value.trim().toLowerCase();
  const l6f = document.getElementById('filter-l6').value;
  const l7f = document.getElementById('filter-l7').value;
  const sf = document.getElementById('filter-signed').value;
  const rows = db.persons.filter(p => {
    if (kw && !p.name.toLowerCase().includes(kw) && !(p.no||'').toLowerCase().includes(kw)) return false;
    if (l6f && p.l6 !== l6f) return false;
    if (l7f && p.l7 !== l7f) return false;
    const isSigned = !!signedMap[p.id];
    if (sf==='1' && !isSigned) return false;
    if (sf==='0' && isSigned) return false;
    return true;
  });
  let html = '';
  rows.forEach(p => {
    const rec = signedMap[p.id]; const signed = !!rec;
    html += '<tr><td style="color:#888">'+(p.no||'')+'</td><td>'+p.name+'</td><td>'+(p.l6||'')+'</td><td>'+(p.l7||'')+'</td>' +
      '<td><span class="badge '+(signed?'badge-signed':'badge-not')+'">'+(signed?'已签到':'未签到')+'</span></td>' +
      '<td style="font-size:12px;color:#888;white-space:nowrap">'+(rec?fmtTime(rec.time):'—')+'</td>' +
      '<td>'+(signed?'<button class="btn btn-outline btn-sm" onclick="cancelCheckin(\''+p.id+'\')">撤销</button>':'<button class="btn btn-success btn-sm" onclick="manualCheckin(\''+p.id+'\')">手动签到</button>')+'</td></tr>';
  });
  document.getElementById('checkin-tbody').innerHTML = html;
}

function manualCheckin(personId) {
  if (db.records.some(r=>r.personId===personId)) return alert('该人员已签到');
  db.records.push({ id:uid(), personId, time:Date.now() });
  saveDB(); renderCheckinTable(); refreshDashboard();
}
function cancelCheckin(personId) {
  if (!confirm('确定撤销该签到记录？')) return;
  db.records = db.records.filter(r=>r.personId!==personId);
  saveDB(); renderCheckinTable(); refreshDashboard();
}

function exportCSV() {
  const signedMap = {};
  db.records.forEach(r=>{ if(r.personId) signedMap[r.personId]=r; });
  const header = '工号,姓名,大区(六级单位),战区(七级单位),签到状态,签到时间';
  const body = db.persons.map(p => {
    const rec = signedMap[p.id];
    return [p.no,p.name,p.l6,p.l7,rec?'已签到':'未签到',rec?fmtTime(rec.time):''].join(',');
  });
  const csv = header + '\n' + body.join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'TCL营销战区签到记录_'+new Date().toLocaleDateString()+'.csv'; a.click();
}

function populatePersonFilters() {
  const l6s = [...new Set(db.persons.map(p=>p.l6).filter(Boolean))].sort();
  const el = document.getElementById('filter-person-l6'); const prev = el.value;
  el.innerHTML = '<option value="">全部大区</option>' + l6s.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
  el.value = prev;
}

function renderPersonTable() {
  const q = document.getElementById('search-person').value.trim().toLowerCase();
  const l6f = document.getElementById('filter-person-l6').value;
  const persons = db.persons.filter(p => {
    if (l6f && p.l6 !== l6f) return false;
    return !q || (p.no||'').toLowerCase().includes(q) || p.name.toLowerCase().includes(q) || (p.l6||'').toLowerCase().includes(q) || (p.l7||'').toLowerCase().includes(q);
  });
  document.getElementById('person-count').textContent = db.persons.length;
  const signedIds = new Set(db.records.map(r=>r.personId).filter(Boolean));
  let html = '';
  persons.forEach(p => {
    html += '<tr><td style="color:#888">'+(p.no||'')+'</td><td>'+p.name+'</td><td>'+(p.l6||'')+'</td><td>'+(p.l7||'')+'</td>' +
      '<td><span class="badge '+(signedIds.has(p.id)?'badge-signed':'badge-not')+'">'+(signedIds.has(p.id)?'已签':'未签')+'</span></td></tr>';
  });
  document.getElementById('person-tbody').innerHTML = html;
}

function clearAllPersons() {
  if (!confirm('确定清空所有人员及签到记录？此操作不可恢复！')) return;
  db.persons=[]; db.records=[]; saveDB(); renderPersonTable(); refreshDashboard();
}

function resetToPreset() {
  if (!confirm('将人员名单恢复为预置的TCL营销战区名单，现有签到记录将清除。是否继续？')) return;
  db = initFromPreset(); saveDB(); renderPersonTable(); refreshDashboard();
  alert('已恢复预置名单（' + db.persons.length + '人）');
}

function getCheckinUrl() { return location.href.split('?')[0]+'?checkin=1'; }
function renderQR() {
  const url = getCheckinUrl();
  document.getElementById('checkin-url-display').textContent = url;
  const container = document.getElementById('qr-container'); container.innerHTML='';
  QRCode.toCanvas(document.createElement('canvas'), url, {width:200,margin:1}, (err,canvas)=>{ if (!err) container.appendChild(canvas); });
}
function downloadQR() { const canvas = document.querySelector('#qr-container canvas'); if (!canvas) return; const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download='签到二维码.png'; a.click(); }
function copyCheckinUrl() { navigator.clipboard.writeText(getCheckinUrl()).then(()=>alert('已复制到剪贴板')); }
function openCheckinPage() { location.href=getCheckinUrl(); }

function checkCheckinMode() {
  if (new URLSearchParams(location.search).get('checkin')==='1') {
    document.getElementById('checkin-landing').style.display='block';
    document.getElementById('app-shell').style.display='none';
  }
}

function previewPerson() {
  const no = document.getElementById('ci-no').value.trim();
  const preview = document.getElementById('ci-preview');
  const noMatch = document.getElementById('ci-no-match');
  if (!no) { preview.style.display='none'; noMatch.style.display='none'; return; }
  const p = db.persons.find(p=>p.no===no);
  if (!p) { preview.style.display='none'; noMatch.style.display='block'; return; }
  noMatch.style.display='none';
  document.getElementById('pv-name').textContent=p.name;
  document.getElementById('pv-l6').textContent=p.l6||'—';
  document.getElementById('pv-l7').textContent=p.l7||'—';
  preview.style.display='block';
}

function submitCheckin() {
  const no = document.getElementById('ci-no').value.trim();
  if (!no) return alert('请输入工号');
  const p = db.persons.find(p=>p.no===no);
  if (!p) return alert('未找到该工号，请确认工号是否正确');
  const existing = db.records.find(r=>r.personId===p.id);
  if (existing) {
    showCard('ci-dup-card');
    document.getElementById('ci-dup-msg').textContent = p.name + '，您的签到已于 ' + fmtTime(existing.time) + ' 完成，无需重复签到';
    return;
  }
  db.records.push({ id:uid(), personId:p.id, time:Date.now() });
  saveDB();
  showCard('ci-success-card');
  const rows = [['姓名',p.name],['工号',p.no],['大区',p.l6],['战区',p.l7]];
  document.getElementById('ci-success-detail').innerHTML = rows.map(([k,v])=>'<div class="info-row"><span class="info-label">'+k+'</span><span class="info-val">'+(v||'—')+'</span></div>').join('');
  document.getElementById('ci-success-time').textContent = '签到时间：'+fmtTime(Date.now());
}

function showCard(id) { ['ci-form-card','ci-success-card','ci-dup-card'].forEach(cid=>{ document.getElementById(cid).style.display = cid===id ? 'block' : 'none'; }); }
function resetCheckinForm() { document.getElementById('ci-no').value=''; document.getElementById('ci-preview').style.display='none'; document.getElementById('ci-no-match').style.display='none'; showCard('ci-form-card'); }

function fmtTime(ts) { const d=new Date(ts); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
function pad(n){ return n<10?'0'+n:n; }

checkCheckinMode();
if (document.getElementById('checkin-landing').style.display!=='block') refreshDashboard();
</script>
</body>
</html>
